<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ScanVote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="dynamsoft/dbr.bundle.js"></script>

<style>
* { box-sizing: border-box; touch-action: manipulation; }
body { font-family: sans-serif; padding: 10px; background: #f0f2f5; margin: 0; text-align: center; }
#status { font-weight: bold; margin: 10px auto; min-height: 65px; padding: 15px; background: white; border-radius: 12px; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 16px; }
#scanner-root { width: min(90vw, 400px); aspect-ratio: 1; margin: 0 auto; position: relative; border: 4px solid #fff; border-radius: 20px; overflow: hidden; background: #000; }
.dce-video-container video { object-fit: contain !important; }
.row { display: flex; gap: 8px; justify-content: center; max-width: 400px; margin: 15px auto; }
button { padding: 15px; flex: 1; border-radius: 10px; border: none; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div id="status">⏳ Đang tải sĩ số...</div>
<div id="scanner-root">
  <div id="scanner-ui">
    <div class="dce-video-container"></div>
  </div>
</div>

<div class="row">
    <button id="startBtn" onclick="startScan()" style="background:#28a745;">▶️ BẮT ĐẦU</button>
    <button id="stopBtn" onclick="stopScan()" style="background:#dc3545;" disabled>⏹️ DỪNG</button>
</div>

<script>
// --- 1. KHỞI TẠO FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyAsD7XOkOm1OoSkTeThBcBXiAuCxKYOGkk",
    projectId: "hoa-english"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();

// Cấu hình quan trọng để nhận tín hiệu biển báo ổn định
db.settings({ experimentalForceLongPolling: true });

// --- 2. BIẾN TOÀN CỤC ---
let validStudentIDs = new Set();
let siSo = 0;
let scanner = null;
let isScanning = false;
let currentSessionId = null;
let currentSignIndex = null;
let scannedInSession = new Set();
let sessionCompleted = false;

// --- 3. TẢI SĨ SỐ ---
function loadStudents() {
    console.log("🚀 Đang nạp sĩ số...");
    fetch("./student.txt", { cache: "no-store" })
        .then(r => {
            if (!r.ok) throw new Error("Không thấy file student.txt");
            return r.text();
        })
        .then(t => {
            validStudentIDs.clear();
            t.trim().split("\n").forEach(line => {
                let p = line.trim().split("|");
                if(p.length >= 2) validStudentIDs.add(p[1]);
            });
            siSo = validStudentIDs.size;
            updateStatus("🏫 Đã tải " + siSo + " học sinh.\nHãy chọn biển để vote!");
            console.log("✅ Đã tải danh sách học sinh.");
        })
        .catch(err => {
            console.error("❌ Lỗi tải sĩ số:", err);
            updateStatus("⚠️ Lỗi: Không tìm thấy file student.txt");
        });
}

// --- 4. KHỞI TẠO DYNAMSOFT (FIX LỖI UNDEFINED) ---
async function initDynamsoft() {
    // Nếu chưa thấy thư viện, đợi 500ms rồi thử lại (tránh lỗi Uncaught TypeError)
    if (typeof Dynamsoft === 'undefined' || !Dynamsoft.DBR) {
        console.warn("⏳ Đợi Dynamsoft nạp file JS...");
        setTimeout(initDynamsoft, 500);
        return;
    }

    try {
        Dynamsoft.DBR.BarcodeReader.license = "DLS2eyJoYW5kc2hha2VDb2RlIjoiMTA1Mjk4MTk0LU1UQTFNams0TVRrMExYZGxZaTFVY21saGJGQnliMm8iLCJtYWluU2VydmVyVVJMIjoiaHR0cHM6Ly9tZGxzLmR5bmFtc29mdG9ubGluZS5jb20vIiwib3JnYW5pemF0aW9uSUQiOiIxMDUyOTgxOTQiLCJzdGFuZGJ5U2VydmVyVVJMIjoiaHR0cHM6Ly9zZGxzLmR5bmFtc29mdG9ubGluZS5jb20vIiwiY2hlY2tDb2RlIjoxOTg2ODM2Mjc1fQ==";
        // Đường dẫn tương đối trỏ vào folder chứa file .wasm
        Dynamsoft.DBR.BarcodeReader.engineResourcePath = "dynamsoft/";
        console.log("📦 Dynamsoft đã sẵn sàng.");
    } catch (e) {
        console.error("❌ Lỗi cấu hình Dynamsoft:", e);
    }
}

// --- 5. LẮNG NGHE FIREBASE (NHẬN BIỂN SỐ) ---
function listenToFirebase() {
    console.log("🔔 Đang lắng nghe tín hiệu biển báo...");
    db.doc("system/activeVoteSession").onSnapshot((doc) => {
        const data = doc.data();
        console.log("📥 Dữ liệu Firebase:", data);

        if (!data || !data.sessionId) {
            currentSessionId = null;
            updateStatus("⚪ Chờ máy tính chọn biển...");
            if(isScanning) stopScan();
            return;
        }

        if (currentSessionId !== data.sessionId) {
            currentSessionId = data.sessionId; 
            currentSignIndex = data.signIndex; 
            scannedInSession.clear(); 
            sessionCompleted = false;
            updateStatus(`🟢 Sẵn sàng quét biển số: ${currentSignIndex + 1}`);
            if(navigator.vibrate) try { navigator.vibrate(100); } catch(e) {}
        }
    }, (err) => {
        console.error("❌ Lỗi Firebase:", err);
    });
}

// --- 6. XỬ LÝ QUÉT MÃ ---
async function startScan() {
    if(!currentSessionId) {
        updateStatus("⚠️ Chưa có biển được chọn...");
        return;
    }

    try {
        if(!scanner) {
            updateStatus("⏳ Đang khởi động camera...");
            scanner = await Dynamsoft.DBR.BarcodeScanner.createInstance();
            await scanner.setUIElement(document.getElementById('scanner-ui'));
            
            let settings = await scanner.getRuntimeSettings();
            settings.barcodeFormatIds = Dynamsoft.DBR.EnumBarcodeFormat.BF_QR_CODE;
            await scanner.updateRuntimeSettings(settings);

            scanner.onFrameRead = results => {
                results.forEach(res => handleResult(res.barcodeText, res));
            };
        }

        await scanner.show();
        isScanning = true;
        document.getElementById("startBtn").disabled = true;
        document.getElementById("stopBtn").disabled = false;
        updateStatus(`📷 Đang quét biển ${currentSignIndex + 1}... (${scannedInSession.size}/${siSo})`);
    } catch (e) { 
        alert("Lỗi camera: " + e.message + "\nLưu ý: Camera yêu cầu HTTPS hoặc Localhost."); 
    }
}

function handleResult(txt, res) {
    if(!isScanning || !currentSessionId || sessionCompleted) return;
    if(!validStudentIDs.has(txt) || scannedInSession.has(txt)) return;

    let answer = "";
    if(res.localizationResult) {
        const loc = res.localizationResult;
        const angle = (Math.atan2(loc.y2 - loc.y1, loc.x2 - loc.x1) * 180 / Math.PI + 360) % 360;
        if (angle >= 315 || angle < 45) answer = "A";
        else if (angle >= 45 && angle < 135) answer = "D";
        else if (angle >= 135 && angle < 225) answer = "C";
        else answer = "B";
    }

    if(answer === "") return;
    scannedInSession.add(txt);

    // Gửi kết quả lên Firestore
    db.collection("voteSessions").doc(currentSessionId).collection("answers").doc(txt).set({
        studentId: txt,
        answer: answer,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    if(navigator.vibrate) try { navigator.vibrate(40); } catch(e) {}

    if(scannedInSession.size >= siSo) {
        completeSession();
    } else {
        updateStatus(`✔️ HS ${txt} → ${answer}\n📷 Biển ${currentSignIndex + 1}: ${scannedInSession.size}/${siSo}`);
    }
}

async function stopScan() {
    isScanning = false;
    if(scanner) await scanner.hide();
    document.getElementById("startBtn").disabled = false;
    document.getElementById("stopBtn").disabled = true;
}

async function completeSession() {
    sessionCompleted = true;
    await stopScan();
    updateStatus(`✅ Đã xong biển ${currentSignIndex + 1}!\n(${siSo}/${siSo} học sinh)`);
    if(navigator.vibrate) try { navigator.vibrate([100, 50, 100]); } catch(e) {}
}

function updateStatus(msg){
    document.getElementById("status").innerText = msg;
}

// --- CHẠY LẦN ĐẦU ---
loadStudents();
initDynamsoft();
listenToFirebase();

</script>
</body>
</html>
